<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق المهام</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <!-- container -->
    <div class="container min-vh-100 d-flex flex-column justify-content-center">
        <div class="position-fixed top-0 end-0 p-4 p-md-5">
            <button class="btn btn-outline-primary"><i class="fa-solid fa-language"></i></button>
        </div>

        <!-- row -->
        <div class=" row mt-5 m-5 d-flex justify-content-center ">
            <!-- col -->
            <div class="col-12 col-md-5 mb-4 ">
                <!-- card -->
                <div class="card shadow-sm rounded-3 border-0">
                    <div class="card-header text-center rounded-top-3">
                        <h3 class="p-1 pb-0 pt-2">Todo List</h3>
                    </div>
                    <div class="card-body">
                        <form id="taskForm1">
                            <div class="mb-4">
                                <input type="text" id="taskInput1" class="form-control  rounded-3" placeholder="Enter new task" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100  rounded-3">Add Task</button>
                        </form>
                        <ul id="taskList1" class="list-group mt-4"></ul>
                    </div>
                <!-- cardend -->
                </div>
            <!-- colend -->
            </div>
            <!-- cardend -->

            <!-- to do: قسم التعليقات -->
            <div class="col-12 col-md-5 mb-4 ">
                <div class="card shadow-sm">
                    <div class="card-header text-center">
                        <h3>تطبيق المهام 2</h3>
                    </div>
                    <div class="card-body">
                        <form id="taskForm2">
                            <div class="mb-3">
                                <input type="text" id="taskInput2" class="form-control" placeholder="أدخل مهمة جديدة" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">إضافة مهمة</button>
                        </form>
                        <ul id="taskList2" class="list-group mt-4"></ul>
                    </div>
                </div>
            </div>
            <!-- to do: قسم التعليقات -->
        </div>
        <!-- rowend -->
    </div>
    <!-- containerend -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
